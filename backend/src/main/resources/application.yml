server:
  port: 8080

spring:
  application:
    name: rwa-platform
  jackson:
    default-property-inclusion: non_null

rwa:
  # 区块链节点 RPC
  rpc-url: ${RPC_URL:http://localhost:8545}
  # 合约地址
  factory-address: ${FACTORY_ADDRESS:}
  nav-oracle-address: ${NAV_ORACLE_ADDRESS:}
  usdt-address: ${USDT_ADDRESS:}
  # 账户（运营 & 管理员）
  operator-private-key: ${OPERATOR_PRIVATE_KEY:}
  admin-api-key: ${ADMIN_API_KEY:changeme-before-production}
  # 后台服务间隔
  nav-update-interval-ms: ${NAV_UPDATE_INTERVAL_MS:21600000}       # 6 小时
  redemption-check-interval-ms: ${REDEMPTION_CHECK_INTERVAL_MS:300000}  # 5 分钟

logging:
  level:
    com.rwaplatform: DEBUG
    org.web3j: WARN
